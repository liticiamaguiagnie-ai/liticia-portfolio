<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2560" viewBox="0 0 1600 2560">
  <defs>
    <linearGradient id="topBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D5016"/>
      <stop offset="100%" style="stop-color:#4A7C2F"/>
    </linearGradient>
    <linearGradient id="bottomBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D5016"/>
      <stop offset="100%" style="stop-color:#4A7C2F"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B9E45"/>
      <stop offset="50%" style="stop-color:#8BC34A"/>
      <stop offset="100%" style="stop-color:#6B9E45"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2D5016" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- FOND BLANC PROPRE -->
  <rect width="1600" height="2560" fill="#FFFFFF"/>

  <!-- Légère texture de fond - carrés très subtils -->
  <rect x="0" y="0" width="1600" height="2560" fill="#F8FAF6" opacity="0.5"/>

  <!-- BANDE VERTE EN HAUT -->
  <rect x="0" y="0" width="1600" height="280" fill="url(#topBand)"/>

  <!-- NOM AUTEURE dans la bande verte -->
  <text x="800" y="120"
        font-family="Arial, sans-serif"
        font-size="44"
        font-weight="normal"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="5"
        opacity="0.95">LITICIA MAGUIAGNIE JEANNETTE</text>

  <!-- Ligne fine blanche sous le nom -->
  <line x1="200" y1="150" x2="1400" y2="150" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>

  <!-- Sous-titre auteure -->
  <text x="800" y="210"
        font-family="Georgia, serif"
        font-size="34"
        font-style="italic"
        fill="#E8F0E0"
        text-anchor="middle"
        opacity="0.85">Autrice • Apprenante de langues • Future Fachinformatikerin</text>

  <!-- Drapeau allemand horizontal sous la bande verte -->
  <rect x="680" y="290" width="240" height="26" rx="0" fill="#000000"/>
  <rect x="680" y="316" width="240" height="26" rx="0" fill="#CC0000"/>
  <rect x="680" y="342" width="240" height="26" rx="0" fill="#FFCE00"/>

  <!-- ZONE PRINCIPALE BLANCHE -->

  <!-- Grand chiffre 120 à gauche - très aéré -->
  <text x="120" y="680"
        font-family="Arial Black, Arial, sans-serif"
        font-size="320"
        font-weight="900"
        fill="#2D5016"
        text-anchor="start"
        opacity="0.08">120</text>

  <!-- TITRE - bien espacé -->
  <text x="800" y="580"
        font-family="Arial Black, Arial, sans-serif"
        font-size="200"
        font-weight="900"
        fill="#2D5016"
        text-anchor="middle"
        filter="url(#softShadow)">120</text>

  <text x="800" y="700"
        font-family="Arial Black, Arial, sans-serif"
        font-size="110"
        font-weight="900"
        fill="#4A7C2F"
        text-anchor="middle"
        letter-spacing="18">JOURS</text>

  <!-- Ligne accent verte -->
  <rect x="200" y="730" width="1200" height="6" rx="3" fill="url(#accentLine)"/>

  <!-- POUR -->
  <text x="800" y="820"
        font-family="Arial, sans-serif"
        font-size="56"
        font-weight="normal"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="20">POUR</text>

  <!-- L'ALLEMAGNE -->
  <text x="800" y="960"
        font-family="Arial Black, Arial, sans-serif"
        font-size="170"
        font-weight="900"
        fill="#2D5016"
        text-anchor="middle">L'ALLEMAGNE</text>

  <!-- Ligne accent fine -->
  <rect x="400" y="990" width="800" height="3" rx="2" fill="#6B9E45" opacity="0.4"/>

  <!-- Sous-titre du livre - bien aéré -->
  <text x="800" y="1090"
        font-family="Georgia, serif"
        font-size="46"
        font-style="italic"
        fill="#555555"
        text-anchor="middle">Comment j'ai appris l'allemand seule</text>

  <text x="800" y="1150"
        font-family="Georgia, serif"
        font-size="46"
        font-style="italic"
        fill="#555555"
        text-anchor="middle">et pourquoi tu peux le faire aussi</text>

  <!-- GRANDE ZONE ILLUSTRATION / INFOS - fond vert très clair -->
  <rect x="0" y="1220" width="1600" height="920" fill="#F0F5EB"/>

  <!-- Ligne de séparation haut de zone -->
  <rect x="0" y="1220" width="1600" height="5" fill="url(#accentLine)"/>

  <!-- Citation / accroche centrée -->
  <text x="800" y="1330"
        font-family="Georgia, serif"
        font-size="48"
        font-style="italic"
        fill="#2D5016"
        text-anchor="middle"
        opacity="0.9">"De Hallo au B1 en 120 jours —</text>
  <text x="800" y="1395"
        font-family="Georgia, serif"
        font-size="48"
        font-style="italic"
        fill="#2D5016"
        text-anchor="middle"
        opacity="0.9">sans école, sans professeur, sans budget."</text>

  <!-- Ligne séparatrice -->
  <line x1="600" y1="1440" x2="1000" y2="1440" stroke="#6B9E45" stroke-width="2" opacity="0.5"/>

  <!-- 3 COLONNES D'ARGUMENTS bien espacées -->
  <!-- Colonne 1 -->
  <circle cx="320" cy="1570" r="60" fill="#2D5016" opacity="0.9"/>
  <text x="320" y="1582" font-family="Arial" font-size="52" fill="#FFFFFF" text-anchor="middle">📖</text>
  <text x="320" y="1670" font-family="Arial" font-size="36" font-weight="bold" fill="#2D5016" text-anchor="middle">Méthode</text>
  <text x="320" y="1710" font-family="Arial" font-size="36" font-weight="bold" fill="#2D5016" text-anchor="middle">complète</text>
  <text x="320" y="1760" font-family="Arial" font-size="30" fill="#666666" text-anchor="middle">Toutes les étapes</text>
  <text x="320" y="1798" font-family="Arial" font-size="30" fill="#666666" text-anchor="middle">de A1 au B1</text>

  <!-- Colonne 2 -->
  <circle cx="800" cy="1570" r="60" fill="#2D5016" opacity="0.9"/>
  <text x="800" y="1582" font-family="Arial" font-size="52" fill="#FFFFFF" text-anchor="middle">🎯</text>
  <text x="800" y="1670" font-family="Arial" font-size="36" font-weight="bold" fill="#2D5016" text-anchor="middle">Plan d'action</text>
  <text x="800" y="1710" font-family="Arial" font-size="36" font-weight="bold" fill="#2D5016" text-anchor="middle">120 jours</text>
  <text x="800" y="1760" font-family="Arial" font-size="30" fill="#666666" text-anchor="middle">Semaine par semaine</text>
  <text x="800" y="1798" font-family="Arial" font-size="30" fill="#666666" text-anchor="middle">actionnable</text>

  <!-- Colonne 3 -->
  <circle cx="1280" cy="1570" r="60" fill="#2D5016" opacity="0.9"/>
  <text x="1280" y="1582" font-family="Arial" font-size="52" fill="#FFFFFF" text-anchor="middle">💡</text>
  <text x="1280" y="1670" font-family="Arial" font-size="36" font-weight="bold" fill="#2D5016" text-anchor="middle">Ressources</text>
  <text x="1280" y="1710" font-family="Arial" font-size="36" font-weight="bold" fill="#2D5016" text-anchor="middle">100% gratuites</text>
  <text x="1280" y="1760" font-family="Arial" font-size="30" fill="#666666" text-anchor="middle">Aucun budget</text>
  <text x="1280" y="1798" font-family="Arial" font-size="30" fill="#666666" text-anchor="middle">nécessaire</text>

  <!-- Ligne séparatrice bas -->
  <rect x="0" y="2145" width="1600" height="5" fill="url(#accentLine)"/>

  <!-- ZONE BLANCHE BASSE -->
  <rect x="0" y="2150" width="1600" height="180" fill="#FFFFFF"/>

  <!-- Niveaux du livre -->
  <text x="800" y="2240"
        font-family="Arial, sans-serif"
        font-size="38"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="3">Adapté aux francophones • Tous niveaux de départ</text>

  <!-- Badge A1→B1 -->
  <rect x="530" y="2270" width="540" height="48" rx="24" fill="#E8F0E0"/>
  <text x="800" y="2303"
        font-family="Arial Black, Arial, sans-serif"
        font-size="32"
        fill="#2D5016"
        text-anchor="middle"
        letter-spacing="4">A1  →  A2  →  B1  ✓</text>

  <!-- BANDE VERTE EN BAS -->
  <rect x="0" y="2370" width="1600" height="190" fill="url(#bottomBand)"/>

  <!-- Ligne fine haut de bande -->
  <line x1="0" y1="2370" x2="1600" y2="2370" stroke="#8BC34A" stroke-width="2" opacity="0.5"/>

  <!-- Texte bas -->
  <text x="800" y="2455"
        font-family="Arial, sans-serif"
        font-size="38"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="2"
        opacity="0.95">Témoignage • Méthode • Guide pratique</text>

  <text x="800" y="2510"
        font-family="Georgia, serif"
        font-size="32"
        font-style="italic"
        fill="#E8F0E0"
        text-anchor="middle"
        opacity="0.8">liticiamaguiagnie-ai.github.io/liticia-portfolio/</text>

</svg>
